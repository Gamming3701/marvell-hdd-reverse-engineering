adapter driver ftdi
ftdi_channel 1
ftdi_vid_pid 0x0403 0x6010
ftdi_layout_init 0x0038 0x003b

transport select jtag
adapter speed 1000

jtag newtap marvell cpu -irlen 4 -expected-id 0x4ba00477
jtag newtap marvell custom1 -irlen 4 -expected-id 0x140003d3
jtag newtap marvell custom2 -irlen 4 -expected-id 0x140003d3

target create marvell.sheeva1 feroceon -chain-position marvell.custom1
target create marvell.sheeva2 feroceon -chain-position marvell.custom2

init
scan_chain
